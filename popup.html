<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outreach Automation Engine</title>

    <link rel="stylesheet" href="popup.css">
</head>

<body>

<div class="app-container">

    <header class="app-header">

        <div class="header-left" style="display: flex; align-items: center; gap: 8px;">
            <img src="../icon48.png" alt="Logo" style="width: 24px; height: 24px; object-fit: contain;">
            <h2 style="margin: 0;">Outreach Engine</h2>
        </div>

        <div class="header-right">

            <span class="status-badge" id="engineStatus">
                READY
            </span>

            <button
                id="themeToggle"
                class="theme-toggle"
                title="Toggle Theme">

                🌙

            </button>

        </div>

    </header>

    <main class="app-body">

        <div class="form-group">

            <label>

                🌐 Target Websites

                <small>One URL Per Line</small>

            </label>

            <textarea
                id="targetUrls"
                rows="3"
                placeholder="https://example.com&#10;https://another.com"></textarea>

        </div>

        <div class="accordion-title">

            📋 Outreach Lead

        </div>

        <div class="form-row">

            <input
                id="leadName"
                type="text"
                placeholder="Full Name">

            <input
                id="leadEmail"
                type="email"
                placeholder="Email Address">

        </div>

        <div class="form-group">

            <textarea
                id="leadMessage"
                rows="4"
                placeholder="Write your outreach message..."></textarea>

        </div>

        <div class="accordion-title">

            ⚙ Automation Settings

        </div>

        <div class="form-group">

            <label>

                2Captcha API Key

            </label>

            <input
                id="captchaKey"
                type="password"
                placeholder="Enter your API Key">

        </div>

        <div class="form-row">

            <input
                id="proxyHost"
                type="text"
                placeholder="Proxy Host">

            <input
                id="proxyPort"
                type="number"
                placeholder="Port">

        </div>

        <div class="form-row">

            <input
                id="proxyUsername"
                type="text"
                placeholder="Username">

            <input
                id="proxyPassword"
                type="password"
                placeholder="Password">

        </div>

        <div class="button-group">

            <button
                id="testApiBtn"
                class="btn-secondary">

                🔑 Test API

            </button>

            <button
                id="testProxyBtn"
                class="btn-secondary">

                🌐 Test Proxy

            </button>

        </div>

        <div class="button-group">

            <button
                id="executeBtn"
                class="btn-primary">

                🚀 Launch Automation

            </button>

            <button
                id="resetBtn"
                class="btn-secondary">

                🗑 Reset Data

            </button>

        </div>

    </main>

    <footer class="app-footer">

        <div class="accordion-title">

            📜 Logs

        </div>

        <div
            id="logConsole"
            class="log-panel">

            <div class="log-line system">

                [System] Engine initialized successfully.

            </div>

        </div>

    </footer>

</div>

<script type="module" src="popup.js"></script>

</body>
</html>
